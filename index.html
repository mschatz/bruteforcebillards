<!doctype html>

    <title>Bruteforce Billiards</title>
    <link rel="stylesheet" href="style.css" />

    <main class="app">
      <section id="menu" class="panel menu-panel active">
        <h1>Bruteforce Billiards</h1>

                <stop offset="0%" stop-color="#9b6a34" />
                <stop offset="100%" stop-color="#a87439" />
              </linearGradient>
              <radialGradient id="cueBall" cx="35%" cy="30%" r="70%">
                <stop offset="0%" stop-color="#ffffff" />
                <stop offset="100%" stop-color="#cfd7e2" />
              </radialGradient>
              <radialGradient id="oneBall" cx="35%" cy="30%" r="70%">

              <radialGradient id="eightBall" cx="35%" cy="30%" r="70%">
                <stop offset="0%" stop-color="#505050" />
                <stop offset="100%" stop-color="#111111" />

            </defs>

            </g>

              <circle cx="141" cy="77" r="2.2" fill="#17345a" />
              <path d="M129 87 C131 91 132 94 131 98" stroke="#9e7154" stroke-width="1.5" fill="none" />
              <path d="M122 103 C126 108 135 108 139 103" stroke="#8f5656" stroke-width="2" fill="none" stroke-linecap="round" />
              <line x1="74" y1="128" x2="111" y2="116" stroke="#efbc94" stroke-width="11" stroke-linecap="round" />
              <line x1="140" y1="118" x2="174" y2="130" stroke="#efbc94" stroke-width="11" stroke-linecap="round" />

                <path d="M7 0 L11 0 L12 8 L14 12 L14 32 L4 32 L4 12 L6 8 Z" fill="#8b5c1f" stroke="rgba(255,255,255,0.35)" />

            </g>
          </svg>
        </div>
        <div class="menu-actions">
          <button id="start8">8-Ball</button>
          <button id="startSandbox">Free-Play Sandbox</button>
          <button id="resumeSaved">Resume Saved Game</button>
        </div>
      </section>

      <section id="game" class="panel game-panel">
        <div class="player-badges table-status">
          <div class="player-badge player-badge-active" id="player1Badge">
            <svg viewBox="0 0 64 64" aria-hidden="true">
              <ellipse cx="32" cy="18" rx="12" ry="15" fill="#f2c39e" />
              <path d="M20 11 C23 3 40 4 45 12 C43 20 41 25 35 24 C37 17 35 12 29 10 C26 9 23 9 20 11 Z" fill="#743b23" />
              <path d="M42 13 C49 13 50 24 43 28 C41 23 41 17 42 13 Z" fill="#6a341f" />
              <circle cx="27" cy="18" r="4.5" fill="none" stroke="#17345a" stroke-width="2" />
              <circle cx="37" cy="18" r="4.5" fill="none" stroke="#17345a" stroke-width="2" />
              <line x1="31" y1="18" x2="33" y2="18" stroke="#17345a" stroke-width="2" />
              <circle cx="27" cy="18" r="1.2" fill="#17345a" />
              <circle cx="37" cy="18" r="1.2" fill="#17345a" />
              <path d="M32 23 C33 25 33 27 32 29" stroke="#9e7154" stroke-width="1.2" fill="none" />
              <path d="M28 31 C30 33 34 33 36 31" stroke="#8f5656" stroke-width="1.6" fill="none" stroke-linecap="round" />
              <rect x="23" y="31" width="18" height="24" rx="7" fill="#e05e98" />
              <path d="M24 52 L40 52 L43 58 L21 58 Z" fill="#7a2f59" />
            </svg>
            <div>
              <strong>Player 1</strong>
              <span id="player1Meta">Open table</span>
            </div>
          </div>
          <div class="player-badge" id="player2Badge">
            <svg viewBox="0 0 64 64" aria-hidden="true">
              <ellipse cx="32" cy="18" rx="12" ry="15" fill="#f2c39e" />
              <path d="M21 10 C24 2 42 3 47 11 C46 17 42 22 37 22 C35 14 30 10 24 10 Z" fill="#2d1a12" />
              <circle cx="27" cy="18" r="4.5" fill="none" stroke="#17345a" stroke-width="2" />
              <circle cx="37" cy="18" r="4.5" fill="none" stroke="#17345a" stroke-width="2" />
              <line x1="31" y1="18" x2="33" y2="18" stroke="#17345a" stroke-width="2" />
              <circle cx="27" cy="18" r="1.2" fill="#17345a" />
              <circle cx="37" cy="18" r="1.2" fill="#17345a" />
              <path d="M32 23 C33 25 33 27 32 29" stroke="#9e7154" stroke-width="1.2" fill="none" />
              <path d="M28 31 C30 33 34 33 36 31" stroke="#8f5656" stroke-width="1.6" fill="none" stroke-linecap="round" />
              <rect x="23" y="31" width="18" height="24" rx="7" fill="#4aa9f7" />
              <path d="M24 33 L32 40 L40 33" fill="#d9efff" opacity="0.95" />
            </svg>
            <div>
              <strong>Player 2</strong>
              <span id="player2Meta">Open table</span>
            </div>
          </div>
        </div>
        <div class="table-wrap">
          <canvas id="table" width="1000" height="500"></canvas>
          <canvas id="overlay" width="1000" height="500"></canvas>
        </div>

        <section class="controls">
          <div class="row spin-row">
            <div class="spin-group">
              <span>Spin / English</span>
              <canvas id="spinPicker" width="110" height="110"></canvas>
              <small id="spinOut">Center hit</small>
              <div class="row power-row">
                <label for="power">Power</label>
                <input id="power" type="range" min="0" max="100" value="30" />
                <output id="powerOut">30%</output>
              </div>
            </div>
            <div class="buttons">
              <button id="shootBtn">Shoot</button>
              <button id="undoBtn">Undo</button>
              <button id="newRackBtn">New Rack</button>
              <button id="backMenuBtn">Menu</button>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
